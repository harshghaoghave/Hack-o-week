<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            background: #ffffff;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .radio-group input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background-color: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>College Event Registration</h2>
    <form action="#" method="post">
        
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required>

        <label for="department">Department</label>
        <select id="department" name="department" required>
            <option value="">-- Select Department --</option>
            <option>Computer Science</option>
            <option>Mechanical Engineering</option>
            <option>Electrical Engineering</option>
            <option>Business Administration</option>
            <option>Arts & Humanities</option>
        </select>

        <label>Year of Study</label>
        <div class="radio-group">
            <label><input type="radio" name="year" value="1st Year" required> 1st</label>
            <label><input type="radio" name="year" value="2nd Year"> 2nd</label>
            <label><input type="radio" name="year" value="3rd Year"> 3rd</label>
            <label><input type="radio" name="year" value="4th Year"> 4th</label>
        </div>

        <label for="event">Select Event</label>
        <select id="event" name="event" required>
            <option value="">-- Choose Event --</option>
            <option>Technical Quiz</option>
            <option>Coding Competition</option>
            <option>Debate Competition</option>
            <option>Cultural Fest</option>
            <option>Sports Tournament</option>
        </select>

        <label for="comments">Additional Comments</label>
        <textarea id="comments" name="comments" rows="3"></textarea>

        <button type="submit">Register Now</button>
    </form>
    <div class="footer">
        © 2026 College Event Committee
    </div>
</div>

</body>
</html>
